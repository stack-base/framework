        body {

        footer {

        }
        
        .footer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 columns on mobile */
            gap: 2rem;
        }
        
        .footer-brand {
            grid-column: span 2 / span 2; /* Full width on mobile */
            margin-bottom: 1rem;
        }
        
        .footer-brand .logo-container {
            margin-bottom: 1rem;
        }
        
        .footer-brand p {
            font-size: 0.875rem;
            margin: 0;
        }

        .footer-brand .copyright {
             margin-top: 1rem;
        }
        
        .footer-links-group h4 {
            color: white;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 1rem;
            margin-top: 0;
        }
        
        .footer-links-group ul {
            list-style: none;
            padding-left: 0;
            margin: 0;
        }
        
        .footer-links-group li {
            margin-bottom: 0.75rem;
        }
        
        .footer-links-group a {
            font-size: 0.875rem;
        }
        
        .footer-links-group a:hover {
            color: white;
        }
        
        .footer-bottom {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #374151; /* gray-700 */
            display: flex;
            flex-direction: column; /* Stack on mobile */
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }
        
        .footer-bottom p {
            font-size: 0.875rem;
            margin: 0;
        }
        
        .footer-socials {
            display: flex;
            gap: 1.5rem;
            align-items: center; /* <-- This line fixes the alignment */
        }
        
        .footer-socials a {
            color: #9ca3af;
            display: flex; /* <-- Add this */
            align-items: center; /* <-- Add this */
        }
        
        .footer-socials a:hover {
            color: white;
        }
        
        .footer-socials svg {
            height: 1.5rem;
            width: 1.5rem;
        }

        /* --- Dark Mode Toggle Button --- */
        #darkModeToggle {
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 0;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease-in-out;
        }

        #darkModeToggle:hover {
            color: white;
        }

        #darkModeToggle svg {
            height: 1.5rem;
            width: 1.5rem;
        }

        /* Show moon by default, hide sun */
        #darkModeToggle .icon-sun {
            display: none;
        }
        #darkModeToggle .icon-moon {
            display: block;
        }

        /* In dark mode, hide moon, show sun */
        body.dark-mode #darkModeToggle .icon-sun {
            display: block;
        }
        body.dark-mode #darkModeToggle .icon-moon {
            display: none;
        }

        /* --- 8. Responsive Media Queries --- */
        
        /* Small screens and up (e.g., large phones) */
        @media (min-width: 640px) {
            .footer-bottom {
                flex-direction: row; /* Side-by-side */
            }
        }
        
        /* Medium screens and up (e.g., tablets) */
        @media (min-width: 768px) {
            /* Adjust footer grid */
            .footer-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            .footer-brand {
                grid-column: span 2 / span 2;
            }
            .footer-links-group {
                grid-column: span 1 / span 1;
            }
        }
        
        /* Large screens and up (e.g., desktops) */
        @media (min-width: 1024px) {
            /* 5-column footer layout */
            .footer-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }
    </style>

    <script>
        // Wait for the document to be fully loaded
        document.addEventListener('DOMContentLoaded', function() {

            // --- Dark Mode Logic ---
            var toggleButton = document.getElementById('darkModeToggle');
            var body = document.body;

            // Function to apply the saved theme
            function applyTheme() {
                var isDarkMode = localStorage.getItem('darkMode') === 'true';
                if (isDarkMode) {
                    body.classList.add('dark-mode');
                } else {
                    body.classList.remove('dark-mode');
                }
            }

            // Apply theme on initial load
            applyTheme();

            // Add click event listener for the toggle button
            toggleButton.addEventListener('click', function() {
                // Toggle the .dark-mode class on the body
                body.classList.toggle('dark-mode');
                
                // Save the user's preference to localStorage
                var isDarkMode = body.classList.contains('dark-mode');
                localStorage.setItem('darkMode', isDarkMode);
            });
        });
    </script>
