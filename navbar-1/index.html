<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <title>StackBase/framework/navbar-1</title>

    <style>
        /* Global Reset */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            margin: 0;
            padding: 0;
            font-size: 16px;
            line-height: 1.5;
        }
        
        .container {
            width: 90%;
            max-width: 1280px;
            margin-left: auto;
            margin-right: auto;
        }
        
        a {
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease-in-out;
        }
        
        button {
            cursor: pointer;
            font-family: inherit;
            border: none;
            background: none;
        }
        
        header {
            background-color: #111827;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        
        header nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 4rem;
            position: relative; /* Context for absolute positioning of mobile menu */
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            z-index: 60; /* Keeps logo above the mobile menu if needed */
        }

        .logo-container img {
            height: 2rem;
            width: 2rem;
        }
        
        .logo-container span {
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            margin-left: 0.75rem;
        }
        
        /* Hamburger Button (Visible on Mobile) */
        .mobile-menu-button {
            display: block;
            color: #d1d5db;
            padding: 0.5rem;
            margin-right: -0.5rem;
            transition: color 0.2s;
            z-index: 60;
        }

        .mobile-menu-button:hover {
            color: white;
        }
        
        .mobile-menu-button svg {
            height: 1.5rem;
            width: 1.5rem;
        }

        /* ========================================
           UNIFIED MENU: MOBILE STYLES (Default)
           ========================================
        */
        .nav-menu {
            position: absolute;
            top: 100%; 
            left: 0;
            width: 100%;
            background-color: #111827;
            padding: 1rem 5% 1.5rem 5%; 
            border-top: 1px solid #374151;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            
            /* Mobile Layout: Stacked vertically */
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            
            /* Hidden by default with animation */
            visibility: hidden;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s ease;
        }
        
        /* Active state for mobile */
        .nav-menu.open {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Links inside the menu */
        .nav-link {
            display: block;
            color: #d1d5db;
            padding: 0.75rem 1rem;
            border-radius: 0.375rem;
            font-weight: 500;
        }
        
        .nav-link:hover {
            color: white;
            background-color: #1f2937;
        }
        
        /* Call to Action Container */
        .nav-cta-container {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 1rem;
            border-top: 1px solid #374151;
            padding-top: 1rem;
        }

        .nav-cta-signin {
            color: #d1d5db;
            font-weight: 500;
            padding: 0.75rem 1rem;
            border-radius: 0.375rem;
            text-align: center;
        }

        .nav-cta-signin:hover {
            color: white;
            background-color: #1f2937;
        }
        
        .nav-cta-signup {
            background-image: linear-gradient(to right, #3b82f6, #14b8a6);
            color: white;
            font-weight: 500;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            text-align: center;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        
        .nav-cta-signup:hover {
            background-image: linear-gradient(to right, #2563eb, #0d9488);
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.1);
        }

        /* ========================================
           UNIFIED MENU: DESKTOP STYLES
           ========================================
        */
        @media (min-width: 768px) {
            .mobile-menu-button {
                display: none; /* Hide hamburger */
            }

            .nav-menu {
                /* Reset Mobile Positioning */
                position: static;
                width: auto;
                background-color: transparent;
                padding: 0;
                border: none;
                box-shadow: none;
                
                /* Change layout to horizontal row */
                flex-direction: row;
                align-items: center;
                flex-grow: 1;
                justify-content: flex-end; /* Pushes content to the right */
                gap: 0.5rem;
                
                /* Always visible on desktop */
                visibility: visible;
                opacity: 1;
                transform: none;
                transition: none;
            }

            .nav-link {
                padding: 0.5rem 0.75rem;
                font-size: 0.875rem;
            }

            .nav-cta-container {
                /* Change CTA layout to horizontal */
                flex-direction: row;
                align-items: center;
                margin-top: 0;
                border-top: none;
                padding-top: 0;
                margin-left: 1.5rem; /* Space between main links and CTAs */
            }

            .nav-cta-signin {
                padding: 0.5rem 0.75rem;
                font-size: 0.875rem;
            }
            
            .nav-cta-signin:hover {
                background-color: transparent; /* Remove mobile background hover */
            }

            .nav-cta-signup {
                padding: 0.5rem 1rem;
                font-size: 0.875rem;
            }
        }
    </style>

</head>

<body>
    <header>
        <nav class="container">
            <div class="logo-container">
                <img 
                    src="https://stack-base.github.io/media/brand/stackbase/stackbase-icon.png" 
                    alt="StackBase Logo"
                    onerror="this.onerror=null;this.src='https://placehold.co/32x32/14b8a6/white?text=SB&font=roboto';"
                >
                <span>StackBase</span>
            </div>
            
            <button id="mobile-menu-button" class="mobile-menu-button" aria-label="Toggle menu">
                <svg stroke="currentColor" fill="none" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>

            <div id="nav-menu" class="nav-menu">
                <a href="https://stack-base.github.io/swiftinvoice" class="nav-link">SwiftInvoice</a>
                <a href="https://stack-base.github.io/swiftinvoice/data-studio" class="nav-link">Data Studio</a>
                <a href="https://stack-base.github.io/timetrekker" class="nav-link">TimeTrekker</a>
                <a href="https://stack-base.github.io/workspace" class="nav-link">Workspace</a>
                
                <div class="nav-cta-container">
                    <a href="https://stack-base.github.io/account/login" class="nav-cta-signin">Sign In</a>
                    <a href="#signup" class="nav-cta-signup">Get Started</a>
                </div>
            </div>
        </nav>
    </header>

    <div style="padding: 2rem; background-color: #f3f4f6; min-height: 100vh;">
        <h1 style="margin-top: 0;">Main Page Content</h1>
        <p>Resize the window to see the single HTML list adapt beautifully to both mobile and desktop via CSS.</p>
    </div>

    <script>
    (function() {
        const menuButton = document.getElementById('mobile-menu-button');
        const navMenu = document.getElementById('nav-menu');
        
        if (menuButton && navMenu) {
            menuButton.addEventListener('click', function() {
                navMenu.classList.toggle('open');
            });
        }
    })();
    </script>
</body>

</html>
