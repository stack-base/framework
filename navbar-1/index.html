<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <title>StackBase/framework/navbar-1</title>

    <style>
        /* Global Reset */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            margin: 0;
            padding: 0;
            font-size: 16px;
            line-height: 1.5;
        }
        
        .container {
            width: 90%;
            max-width: 1280px;
            margin-left: auto;
            margin-right: auto;
        }
        
        a {
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease-in-out;
        }
        
        button {
            cursor: pointer;
            font-family: inherit;
            border: none;
            background: none;
        }
        
        header {
            background-color: #111827;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        
        header nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 4rem;
        }
        
        /* Set relative positioning and high z-index so the logo stays above the sliding menu */
        .logo-container {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            position: relative;
            z-index: 60; 
        }

        .logo-container img {
            height: 2rem;
            width: 2rem;
        }
        
        .logo-container span {
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            margin-left: 0.75rem;
        }
        
        /* Stay above the sliding menu */
        .mobile-menu-button {
            display: block;
            color: #d1d5db;
            padding: 0.5rem;
            margin-right: -0.5rem;
            transition: color 0.2s;
            position: relative;
            z-index: 60; 
        }

        .mobile-menu-button:hover {
            color: white;
        }
        
        .mobile-menu-button svg {
            height: 1.5rem;
            width: 1.5rem;
        }

        /* ========================================
           UNIFIED MENU: MOBILE STYLES (Full Screen)
           ========================================
        */
        .nav-menu {
            position: fixed; /* Fix to viewport */
            top: 0; 
            left: 0;
            width: 100%;
            height: 100vh; /* Full screen height */
            background-color: #111827;
            padding: 5rem 5% 2rem 5%; /* Top padding pushes links below the header */
            
            /* Mobile Layout: Stacked vertically and centered */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4rem; /* Larger gap for full screen breathing room */
            
            /* Hidden by default with animation from top */
            visibility: hidden;
            transform: translateY(-100%); /* Start completely off-screen at the top */
            transition: transform 0.4s ease-in-out, visibility 0.4s ease-in-out;
            z-index: 40; /* Lower than logo and hamburger button */
        }
        
        /* Active state for mobile */
        .nav-menu.open {
            visibility: visible;
            transform: translateY(0); /* Slide down into view */
        }
        
        /* Links inside the menu */
        .nav-link {
            display: block;
            color: #d1d5db;
            font-size: 1.25rem; /* Larger text for mobile full screen */
            font-weight: 500;
        }
        
        .nav-link:hover {
            color: white;
        }
        
        /* Call to Action Container */
        .nav-cta-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 1rem;
            margin-top: 1rem;
            border-top: 1px solid #374151;
            padding-top: 2rem;
        }

        .nav-cta-signin {
            color: #d1d5db;
            font-size: 1.125rem;
            font-weight: 500;
            padding: 0.75rem 1rem;
            border-radius: 0.375rem;
            text-align: center;
        }

        .nav-cta-signin:hover {
            color: white;
            background-color: #1f2937;
        }
        
        .nav-cta-signup {
            background-image: linear-gradient(to right, #3b82f6, #14b8a6);
            color: white;
            font-size: 1.125rem;
            font-weight: 500;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            text-align: center;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        
        .nav-cta-signup:hover {
            background-image: linear-gradient(to right, #2563eb, #0d9488);
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.1);
        }

        /* ========================================
           UNIFIED MENU: DESKTOP STYLES
           ========================================
        */
        @media (min-width: 768px) {
            .mobile-menu-button {
                display: none; /* Hide hamburger */
            }

            .nav-menu {
                /* Reset Mobile Full Screen Positioning */
                position: static;
                width: auto;
                height: auto;
                background-color: transparent;
                padding: 0;
                
                /* Change layout to horizontal row */
                flex-direction: row;
                align-items: center;
                flex-grow: 1;
                justify-content: flex-end; /* Pushes content to the right */
                gap: 0.5rem;
                
                /* Always visible on desktop */
                visibility: visible;
                transform: none;
                transition: none;
            }

            .nav-link {
                padding: 0.5rem 0.75rem;
                font-size: 0.875rem; /* Reset to smaller font for desktop */
            }

            .nav-link:hover {
                background-color: #1f2937;
                border-radius: 0.375rem;
            }

            .nav-cta-container {
                /* Change CTA layout to horizontal */
                flex-direction: row;
                align-items: center;
                width: auto;
                margin-top: 0;
                border-top: none;
                padding-top: 0;
                margin-left: 1.5rem; /* Space between main links and CTAs */
            }

            .nav-cta-signin {
                padding: 0.5rem 0.75rem;
                font-size: 0.875rem;
            }
            
            .nav-cta-signin:hover {
                background-color: transparent; /* Remove mobile background hover */
            }

            .nav-cta-signup {
                padding: 0.5rem 1rem;
                font-size: 0.875rem;
            }
        }
    </style>

</head>

<body>
    <header>
        <nav class="container">
            <div class="logo-container">
                <img 
                    src="https://stack-base.github.io/media/brand/stackbase/stackbase-icon.png" 
                    alt="StackBase Logo"
                    onerror="this.onerror=null;this.src='https://placehold.co/32x32/14b8a6/white?text=SB&font=roboto';"
                >
                <span>StackBase</span>
            </div>
            
            <button id="mobile-menu-button" class="mobile-menu-button" aria-label="Toggle menu">
                <svg id="menu-icon-svg" stroke="currentColor" fill="none" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>

            <div id="nav-menu" class="nav-menu">
                <a href="https://stack-base.github.io/swiftinvoice" class="nav-link">SwiftInvoice</a>
                <a href="https://stack-base.github.io/swiftinvoice/data-studio" class="nav-link">Data Studio</a>
                <a href="https://stack-base.github.io/timetrekker" class="nav-link">TimeTrekker</a>
                <a href="https://stack-base.github.io/workspace" class="nav-link">Workspace</a>
                
                <div class="nav-cta-container">
                    <a href="https://stack-base.github.io/account/login" class="nav-cta-signin">Sign In</a>
                    <a href="#signup" class="nav-cta-signup">Get Started</a>
                </div>
            </div>
        </nav>
    </header>

    <script>
    (function() {
        const menuButton = document.getElementById('mobile-menu-button');
        const navMenu = document.getElementById('nav-menu');
        const menuIconSvg = document.getElementById('menu-icon-svg');
        
        // The SVG paths for the hamburger (open) and X (close) icons
        const hamburgerPath = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />';
        const closePath = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />';

        if (menuButton && navMenu) {
            menuButton.addEventListener('click', function() {
                const isOpen = navMenu.classList.toggle('open');
                
                // Swap the icon and lock scrolling
                if (isOpen) {
                    menuIconSvg.innerHTML = closePath;
                    document.body.style.overflow = 'hidden'; // Prevents scrolling behind the menu
                } else {
                    menuIconSvg.innerHTML = hamburgerPath;
                    document.body.style.overflow = ''; // Restores scrolling
                }
            });

            // Ensure scrolling is restored if the screen is resized back to desktop while menu is open
            window.addEventListener('resize', function() {
                if (window.innerWidth >= 768) {
                    document.body.style.overflow = '';
                    navMenu.classList.remove('open');
                    menuIconSvg.innerHTML = hamburgerPath;
                }
            });
        }
    })();
    </script>
</body>

</html>
